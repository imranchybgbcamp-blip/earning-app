<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Global Earning Pro - 16 Limit Edition</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src='//libtl.com/sdk.js' data-zone='10506581' data-sdk='show_10506581'></script>

    <style>
        :root { --primary: #6366f1; --bg: #0f172a; --card: #1e293b; --text: #f8fafc; --accent: #10b981; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: var(--text); overflow-x: hidden; }

        #splash { position: fixed; inset: 0; background: var(--bg); z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .loader { width: 45px; height: 45px; border: 5px solid #334155; border-top-color: var(--primary); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        .header { padding: 15px 20px; background: var(--card); display: flex; align-items: center; gap: 12px; border-bottom: 1px solid #334155; }
        .header img { width: 42px; height: 42px; border-radius: 50%; border: 2px solid var(--primary); }

        .app-content { padding: 20px; padding-bottom: 120px; }
        .page { display: none; animation: fadeIn 0.4s; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .balance-card { background: linear-gradient(135deg, #4f46e5, #9333ea); padding: 25px; border-radius: 20px; text-align: center; margin-bottom: 25px; box-shadow: 0 10px 25px rgba(0,0,0,0.3); }
        .balance-card h2 { font-size: 2.3rem; margin: 5px 0; }

        .task-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .task-card { background: var(--card); padding: 20px; border-radius: 18px; text-align: center; border: 1px solid rgba(255,255,255,0.05); cursor: pointer; position: relative; }
        .task-card i { font-size: 1.8rem; color: var(--primary); margin-bottom: 10px; }
        .limit-badge { position: absolute; top: 10px; right: 10px; font-size: 0.65rem; background: rgba(0,0,0,0.3); padding: 2px 8px; border-radius: 10px; color: var(--accent); }

        .nav { position: fixed; bottom: 0; width: 100%; background: var(--card); display: flex; padding: 12px 0; border-top: 1px solid #334155; z-index: 100; }
        .nav-item { flex: 1; text-align: center; font-size: 0.7rem; color: #94a3b8; cursor: pointer; }
        .nav-item.active { color: var(--primary); }

        .btn-action { background: var(--primary); color: white; border: none; padding: 15px; border-radius: 12px; width: 100%; font-weight: bold; cursor: pointer; }
        .input-box { width: 100%; padding: 14px; margin-bottom: 12px; border-radius: 10px; border: 1px solid #334155; background: #0f172a; color: white; outline: none; }
        
        .ad-footer { text-align: center; padding: 10px; background: #000; border-radius: 10px; margin-top: 15px; overflow: hidden; }
    </style>
</head>
<body>

    <div id="splash">
        <h2 style="letter-spacing: 2px;">GLOBAL EARNING</h2>
        <div class="loader" style="margin-top: 20px;"></div>
    </div>

    <header class="header">
        <img id="u-img" src="https://ui-avatars.com/api/?name=User">
        <div>
            <h4 id="u-name">Loading...</h4>
            <p id="u-id" style="font-size: 0.7rem; color: var(--primary);">ID: 000000</p>
        </div>
    </header>

    <div class="app-content">
        <div id="home" class="page active">
            <div class="balance-card">
                <p style="opacity: 0.8; font-size: 0.9rem;">Total Balance</p>
                <h2>৳ <span id="bal-text">0.00</span></h2>
            </div>

            <h3 style="margin-bottom: 15px;">টাস্ক (প্রতি ৩ ঘণ্টা রিলোড)</h3>
            <div class="task-grid">
                <div class="task-card" onclick="startTask('video')">
                    <span class="limit-badge" id="limit-video">16/16</span>
                    <i class="fas fa-play-circle"></i>
                    <p>Video Ad</p>
                </div>
                <div class="task-card" onclick="showPage('spin-page')">
                    <span class="limit-badge" id="limit-spin">16/16</span>
                    <i class="fas fa-dharmachakra"></i>
                    <p>Lucky Spin</p>
                </div>
                <div class="task-card" onclick="startTask('smart1')">
                    <span class="limit-badge" id="limit-smart1">16/16</span>
                    <i class="fas fa-link" style="color: #10b981;"></i>
                    <p>Smart Link 1</p>
                </div>
                <div class="task-card" onclick="startTask('smart2')">
                    <span class="limit-badge" id="limit-smart2">16/16</span>
                    <i class="fas fa-link" style="color: #f59e0b;"></i>
                    <p>Smart Link 2</p>
                </div>
            </div>

            <div class="ad-footer">
                <script type="text/javascript">
                    atOptions = { 'key' : 'b2c8ed21e7d6fd0e5ae3e51b9a14e03b', 'format' : 'iframe', 'height' : 50, 'width' : 320, 'params' : {} };
                </script>
                <script type="text/javascript" src="https://www.highperformanceformat.com/b2c8ed21e7d6fd0e5ae3e51b9a14e03b/invoke.js"></script>
            </div>
        </div>

        <div id="spin-page" class="page">
            <div style="text-align: center;">
                <button onclick="showPage('home')" style="float: left; background: none; border: none; color: white;"><i class="fas fa-arrow-left"></i> ফিরে যান</button>
                <h3 style="margin-top: 40px;">Lucky Wheel</h3>
                <div style="position: relative; width: 260px; margin: 30px auto;">
                    <div style="position: absolute; top: -10px; left: 50%; transform: translateX(-50%); width: 25px; height: 35px; background: #ef4444; clip-path: polygon(50% 100%, 0 0, 100% 0); z-index: 5;"></div>
                    <img id="wheel" src="https://i.ibb.co/9Hsy7QC/wheel.png" style="width: 100%; transition: transform 4s cubic-bezier(0.1, 0, 0, 1);">
                </div>
                <button class="btn-action" id="spin-btn" onclick="handleSpin()">স্পিন করুন</button>
            </div>
        </div>

        <div id="wallet" class="page">
            <h3>টাকা উত্তোলন</h3>
            <div class="balance-card" style="padding: 15px; margin-top: 15px;">
                <p>Withdrawal Balance</p>
                <h3 id="wal-text-sub">৳ 0.00</h3>
            </div>
            <div style="background: var(--card); padding: 20px; border-radius: 15px; margin-top: 20px;">
                <select id="w-method" class="input-box">
                    <option value="Bkash">bKash</option>
                    <option value="Nagad">Nagad</option>
                </select>
                <input type="text" id="w-phone" class="input-box" placeholder="আপনার নম্বর">
                <input type="number" id="w-amount" class="input-box" placeholder="মিনিমাম ৩০ টাকা">
                <button class="btn-action" onclick="submitWithdraw()">উইথড্র রিকোয়েস্ট</button>
            </div>
        </div>
    </div>

    <nav class="nav">
        <div class="nav-item active" onclick="showPage('home', this)"><i class="fas fa-home fa-lg"></i><br>Home</div>
        <div class="nav-item" onclick="showPage('wallet', this)"><i class="fas fa-wallet fa-lg"></i><br>Wallet</div>
        <div class="nav-item" onclick="tg.showAlert('টেলিগ্রাম সাপোর্ট: @YourAdmin')"><i class="fas fa-headset fa-lg"></i><br>Support</div>
    </nav>

    <script>
        const tg = window.Telegram.WebApp;
        const BOT_TOKEN = "8546793925:AAFs2xfGFkutrydu4TRdVQxxjU1N0g3HaDU";
        const ADMIN_ID = "7677039712";
        
        // আপনার দেওয়া নতুন স্মার্ট লিঙ্কগুলো
        const SMART_LINK_1 = "https://www.profitablecpmratenetwork.com/qyiup1t1n?key=9520d844c44f73ddd794268a7d0cef08";
        const SMART_LINK_2 = "https://www.profitablecpmratenetwork.com/i70hzhn4?key=6ac7c7281b42bc6d77d53248d2f93c9d";

        let balance = parseFloat(localStorage.getItem('user_bal')) || 0;
        let taskLimits = JSON.parse(localStorage.getItem('task_limits')) || { video: 16, spin: 16, smart1: 16, smart2: 16 };
        let lastReset = parseInt(localStorage.getItem('last_reset')) || Date.now();

        // ৩ ঘণ্টা রিলোড লজিক
        if (Date.now() - lastReset >= 10800000) {
            taskLimits = { video: 16, spin: 16, smart1: 16, smart2: 16 };
            lastReset = Date.now();
            saveData();
        }

        window.onload = () => {
            tg.ready();
            tg.expand();
            const user = tg.initDataUnsafe.user;
            if(user) {
                document.getElementById('u-name').innerText = user.first_name;
                document.getElementById('u-id').innerText = "ID: " + user.id;
                document.getElementById('u-img').src = user.photo_url || `https://ui-avatars.com/api/?name=${user.first_name}&background=6366f1&color=fff`;
            }
            updateUI();
            setTimeout(() => document.getElementById('splash').remove(), 2000);
        };

        function showPage(pageId, navElement = null) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            if(navElement) {
                document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
                navElement.classList.add('active');
            }
        }

        function updateUI() {
            document.getElementById('bal-text').innerText = balance.toFixed(2);
            document.getElementById('wal-text-sub').innerText = "৳ " + balance.toFixed(2);
            document.getElementById('limit-video').innerText = `${taskLimits.video}/16`;
            document.getElementById('limit-spin').innerText = `${taskLimits.spin}/16`;
            document.getElementById('limit-smart1').innerText = `${taskLimits.smart1}/16`;
            document.getElementById('limit-smart2').innerText = `${taskLimits.smart2}/16`;
        }

        function saveData() {
            localStorage.setItem('user_bal', balance);
            localStorage.setItem('task_limits', JSON.stringify(taskLimits));
            localStorage.setItem('last_reset', lastReset);
        }

        function startTask(type) {
            if (taskLimits[type] <= 0) return tg.showAlert("এই টাস্কের লিমিট শেষ! ৩ ঘণ্টা পর আবার চেষ্টা করুন।");

            let adStartTime = Date.now();

            if (type === 'video') {
                show_10506581().then(() => {
                    if (Date.now() - adStartTime >= 10000) finalizeTask('video');
                    else tg.showAlert("আপনি সম্পূর্ণ অ্যাড দেখেননি! টাকা যোগ হয়নি।");
                }).catch(() => tg.showAlert("অ্যাড লোড হয়নি, আবার চেষ্টা করুন।"));
            } 
            else if (type === 'smart1') {
                window.open(SMART_LINK_1, '_blank');
                handleExternalTask('smart1');
            } 
            else if (type === 'smart2') {
                window.open(SMART_LINK_2, '_blank');
                handleExternalTask('smart2');
            }
        }

        function handleExternalTask(type) {
            setTimeout(() => {
                tg.showConfirm("আপনি কি ১০ সেকেন্ড অ্যাডটি দেখেছেন?", (ok) => {
                    if(ok) finalizeTask(type);
                    else tg.showAlert("টাকা পেতে হলে অবশ্যই অ্যাড দেখতে হবে।");
                });
            }, 10000);
        }

        function finalizeTask(type) {
            balance += 0.7; // প্রতি অ্যাডে ০.৭ টাকা
            taskLimits[type]--;
            saveData();
            updateUI();
            tg.showAlert("অভিনন্দন! ০.৭ টাকা যোগ হয়েছে।");
        }

        function handleSpin() {
            if (taskLimits.spin <= 0) return tg.showAlert("লিমিট শেষ!");
            const btn = document.getElementById('spin-btn');
            const wheel = document.getElementById('wheel');
            btn.disabled = true;

            const rotate = Math.floor(3000 + Math.random() * 3000);
            wheel.style.transform = `rotate(${rotate}deg)`;

            setTimeout(() => {
                let adStartTime = Date.now();
                show_10506581().then(() => {
                    if(Date.now() - adStartTime >= 8000) finalizeTask('spin');
                    else tg.showAlert("অ্যাড না দেখায় টাকা যোগ হয়নি!");
                    btn.disabled = false;
                }).catch(() => {
                    tg.showAlert("অ্যাড এরর!");
                    btn.disabled = false;
                });
            }, 4000);
        }

        async function submitWithdraw() {
            const amt = parseFloat(document.getElementById('w-amount').value);
            const phone = document.getElementById('w-phone').value;
            const method = document.getElementById('w-method').value;
            const user = tg.initDataUnsafe.user;

            if (amt < 30 || amt > balance || phone.length < 10) {
                return tg.showAlert("ভুল তথ্য অথবা ব্যালেন্স কম! মিনিমাম ৩০ টাকা।");
            }

            const text = encodeURIComponent(`💰 উইথড্র রিকোয়েস্ট!\nইউজার: ${user ? user.first_name : 'Unknown'}\nID: ${user ? user.id : 'N/A'}\nমেথড: ${method}\nফোন: ${phone}\nপরিমাণ: ${amt} TK`);
            
            try {
                await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage?chat_id=${ADMIN_ID}&text=${text}`);
                balance -= amt;
                saveData();
                updateUI();
                tg.showAlert("রিকোয়েস্ট সফলভাবে অ্যাডমিনের কাছে পাঠানো হয়েছে!");
            } catch(e) { tg.showAlert("নেটওয়ার্ক সমস্যা!"); }
        }
    </script>
</body>
        </html>
